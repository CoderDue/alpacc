name: CI

on:
  pull_request:
    types: [synchronize, labeled]

  push:
    branches: [ main ]

env:
  GHC_VERSION: '9.14.1'
  CABAL_VERSION: '3.16.0.0'
  FUTHARK_VERSION: 'nightly'

jobs:
  build:
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'test')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up GHC ${{ env.GHC_VERSION }}
        uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: ${{ env.CABAL_VERSION }}
          cabal-update: true

      - name: Cache Cabal packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-${{ hashFiles('**/*.cabal', '**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-
            ${{ runner.os }}-cabal-

      - name: Install dependencies
        run: cabal build all --only-dependencies

      - name: Build
        run: cabal build all

      - name: Install
        run: cabal install --installdir=$HOME/alpacc-bin --overwrite-policy=always

      - name: Upload alpacc binary
        uses: actions/upload-artifact@v4
        with:
          name: alpacc-binary
          path: ~/alpacc-bin/alpacc

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up GHC ${{ env.GHC_VERSION }}
        uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: ${{ env.CABAL_VERSION }}
          cabal-update: true

      - name: Restore Cabal cache
        uses: actions/cache/restore@v3
        with:
          path: |
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-${{ hashFiles('**/*.cabal', '**/cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-${{ env.GHC_VERSION }}-
            ${{ runner.os }}-cabal-

      - name: Download alpacc binary
        uses: actions/download-artifact@v4
        with:
          name: alpacc-binary
          path: ~/alpacc-bin/

      - name: Make alpacc binary executable
        run: |
          chmod +x ~/alpacc-bin/alpacc
          echo "$HOME/alpacc-bin" >> $GITHUB_PATH

      - name: Install Futhark (${{ env.FUTHARK_VERSION }})
        uses: diku-dk/install-futhark@v1.1.0
        with:
          version: ${{ env.FUTHARK_VERSION }}

      - name: Unit tests
        run: make test-unit

      - name: Futhark tests
        run: make test-futhark-multicore

      - name: C tests
        run: |
          export CFLAGS="-fsanitize=undefined -fno-sanitize-recover -O"
          make test-c
